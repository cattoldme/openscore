services:
  db-init:
    build:
      context: .
    container_name: openscore-db-init
    restart: "no"
    command: ["sh", "-c", "pnpm db:migrate && pnpm db:seed"]
    environment:
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://openscore:openscore@postgres:5432/openscore?schema=public}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
    container_name: openscore-api
    restart: unless-stopped
    command: ["pnpm", "--filter", "@openscore/api", "start"]
    environment:
      NODE_ENV: production
      WEB_PUBLIC_BASE_URL: ${WEB_PUBLIC_BASE_URL:-http://localhost:3000}
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql://openscore:openscore@postgres:5432/openscore?schema=public}
      REDIS_URL: ${COMPOSE_REDIS_URL:-redis://redis:6379}
      CACHE_PROVIDER: ${COMPOSE_CACHE_PROVIDER:-redis}
      SPORTS_REPOSITORY: ${COMPOSE_SPORTS_REPOSITORY:-postgres}
      SPORTS_PROVIDER: ${SPORTS_PROVIDER:-mock}
      FOOTBALL_DATA_API_KEY: ${FOOTBALL_DATA_API_KEY:-}
      FOOTBALL_DATA_BASE_URL: ${FOOTBALL_DATA_BASE_URL:-https://api.football-data.org/v4}
      FOOTBALL_DATA_COMPETITIONS: ${FOOTBALL_DATA_COMPETITIONS:-PL}
      THESPORTSDB_API_KEY: ${THESPORTSDB_API_KEY:-}
      OPENLIGADB_BASE_URL: ${OPENLIGADB_BASE_URL:-https://www.openligadb.de/api}
      AI_PROVIDER: ${AI_PROVIDER:-disabled}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      LIVE_SYNC_INTERVAL_SECONDS: ${LIVE_SYNC_INTERVAL_SECONDS:-60}
      FIXTURE_SYNC_INTERVAL_MINUTES: ${FIXTURE_SYNC_INTERVAL_MINUTES:-15}
    ports:
      - "4000:4000"
    depends_on:
      db-init:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:4000/health').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    container_name: openscore-web
    restart: unless-stopped
    command: ["pnpm", "--filter", "@openscore/web", "start"]
    environment:
      NODE_ENV: production
      WEB_PUBLIC_BASE_URL: ${WEB_PUBLIC_BASE_URL:-http://localhost:3000}
      API_BASE_URL: http://api:4000
      NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:4000}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000').then((response)=>process.exit(response.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: openscore-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: openscore
      POSTGRES_USER: openscore
      POSTGRES_PASSWORD: openscore
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U openscore -d openscore"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: openscore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
  redis-data:
