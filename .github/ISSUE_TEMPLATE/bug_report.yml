name: Bug report
description: Report a reproducible OpenScore bug.
title: "bug: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: The match list shows...
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps and URLs.
      placeholder: |
        1. Start API with SPORTS_PROVIDER=mock
        2. Open http://localhost:3000
        3. Click ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: I expected...
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Instead...
    validations:
      required: true
  - type: input
    id: provider
    attributes:
      label: Data provider
      placeholder: mock, football_data, or other
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node.js, pnpm, browser, and deployment mode.
      placeholder: Windows 11, Node 24, pnpm 11.7, Chrome, local dev
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      render: shell
