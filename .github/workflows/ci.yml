name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  CI: "true"
  NEXT_TELEMETRY_DISABLED: "1"
  SPORTS_REPOSITORY: memory
  CACHE_PROVIDER: memory
  SPORTS_PROVIDER: mock
  DATABASE_URL: postgresql://openscore:openscore@localhost:5432/openscore?schema=public
  REDIS_URL: redis://localhost:6379
  NEXT_PUBLIC_API_BASE_URL: http://localhost:4000

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm db:generate

      - name: Validate Prisma schema
        run: pnpm db:validate

      - name: Validate seed payload
        run: pnpm db:seed:dry-run

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: API smoke test
        run: pnpm smoke:api

      - name: Web smoke test
        run: pnpm smoke:web
      - name: Provider smoke test
        run: pnpm smoke:provider
